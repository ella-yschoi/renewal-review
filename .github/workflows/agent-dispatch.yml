name: Agent Dispatch

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  dispatch:
    if: github.event.label.name == 'tier:one-shot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Agentic Dev Pipeline
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          claude_args: '--model ${{ vars.CLAUDE_MODEL_DISPATCH || ''sonnet'' }} --max-turns 25 --allowedTools "Bash,Edit,Read,Write,Glob,Grep"'
          settings: '{"hooks": {}}'
          prompt: |
            You are an autonomous agent implementing a feature from a GitHub issue.

            ## Setup
            Follow CLAUDE.md and .claude/rules/conventions.md (already loaded).

            ## Issue
            Title: ${{ github.event.issue.title }}
            Body:
            ${{ github.event.issue.body }}

            ## Steps
            1. Create `docs/experiments/{N}-requirements-{name}.md` with acceptance criteria.
            2. Create `docs/experiments/{N}-task-{name}.md` with implementation plan.
               Use the next available N by checking existing files in docs/experiments/.
            3. Implement the feature following the task file.
            4. Run `make lint` then `make test`. If any fail, read the error, fix, and retry.
            5. Self-verify: list changed files (`git diff --name-only main...HEAD && git ls-files --others --exclude-standard`), describe what each does, compare against the requirements doc. Fix discrepancies and re-run step 4.
            6. `git add` changed files, `git commit`, `git push origin HEAD`.

            ## Rules
            - Follow conventions.md (no docstrings, type hints, files < 300 lines).
            - One logical change per commit.
            - Do NOT install new dependencies without approval in the issue.
            - Do NOT use rm -rf or sudo commands.
            - Write ALL output in English.
